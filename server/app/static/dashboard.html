<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>espnokia · Claw'd</title>
<style>
  /* mesma paleta do logo espnokia da pagina AP: azul #1d4487 / laranja #e56825 */
  :root{
    --bg:#b9b9b9; --card:#fff; --ink:#1d4487; --ink2:#44598f;
    --orange:#e56825; --dim:#777; --line:#dde3f0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,Consolas,monospace;font-size:14px;line-height:1.5;
    display:flex;justify-content:center;padding:24px 12px}
  .wrap{width:100%;max-width:680px}
  .card{background:var(--card);border:3px solid var(--ink);
    box-shadow:8px 8px 0 var(--ink);padding:0;margin-bottom:20px}
  .top{padding:14px 16px;border-bottom:3px solid var(--orange);
    display:flex;align-items:center;gap:10px}
  .logo{font-size:18px;font-weight:bold;letter-spacing:1px}
  .logo .e{color:var(--orange)} .logo .n{color:var(--ink)}
  .logo small{color:var(--ink2);font-weight:normal;font-size:12px;letter-spacing:0}
  .star{color:var(--orange);font-size:20px}
  .dot{font-size:11px;letter-spacing:1px;text-transform:uppercase}
  .dot.on{color:var(--orange)} .dot.off{color:var(--dim)}
  .right{margin-left:auto;display:flex;align-items:center;gap:8px}
  select.lang{border:2px solid var(--ink);background:#fff;color:var(--ink);
    font:inherit;font-size:13px;padding:4px 4px;border-radius:0}
  .body{padding:16px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--ink2);margin:14px 0 4px}
  input,select,textarea{width:100%;border:2px solid var(--ink);padding:9px 8px;
    font:inherit;font-size:14px;background:#fff;border-radius:0;color:var(--ink)}
  textarea{min-height:96px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--orange)}
  .row{display:flex;gap:12px} .row>div{flex:1}
  button{border:2px solid var(--ink);background:var(--ink);color:#fff;font:inherit;
    font-size:14px;font-weight:bold;letter-spacing:2px;padding:11px 16px;cursor:pointer;
    border-radius:0;margin-top:16px}
  button:active{background:var(--orange);border-color:var(--orange)}
  button.ghost{background:#fff;color:var(--orange);border-color:var(--orange);
    font-size:12px;letter-spacing:1px;padding:9px 12px}
  button.ghost:active{background:var(--orange);color:#fff}
  .tabs{display:flex;border-bottom:3px solid var(--ink)}
  .tabs button{flex:1;margin:0;background:#fff;color:var(--ink2);border:0;
    border-right:2px solid var(--line);padding:12px;letter-spacing:1px;font-weight:bold}
  .tabs button:last-child{border-right:0}
  .tabs button.sel{background:var(--ink);color:#fff}
  .tabs button:active{background:var(--orange);color:#fff}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{border:2px solid var(--ink);padding:10px 12px}
  .stat b{display:block;font-size:18px;color:var(--orange)}
  .stat span{font-size:10px;color:var(--ink2);text-transform:uppercase;letter-spacing:1px}
  pre.mem{white-space:pre-wrap;word-wrap:break-word;background:#f4f6fb;
    border:2px solid var(--ink);padding:12px;margin:0;color:var(--ink);font-size:13px}
  .talk{border-left:3px solid var(--orange);padding:3px 0 3px 12px;margin:12px 0}
  .talk .meta{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:1px}
  .talk .q{color:var(--ink)} .talk .r{color:var(--orange);margin-top:2px}
  .pag{display:flex;align-items:center;gap:12px;margin-top:14px;color:var(--ink2)}
  .pag button{margin:0;background:#fff;color:var(--ink);border:2px solid var(--ink);
    padding:5px 12px;font-weight:bold}
  .muted{color:var(--dim);font-size:12px}
  .hide{display:none}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 22px;font-weight:bold;letter-spacing:1px;
    box-shadow:5px 5px 0 var(--orange);opacity:0;transition:opacity .25s}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <!-- login -->
  <div id="login" class="card">
    <div class="top">
      <span class="star">✳</span>
      <span class="logo"><span class="e">esp</span><span class="n">nokia</span>
        <small data-i18n="sub">· painel do Claw'd</small></span>
      <span class="right"><select id="lang0" class="lang" onchange="setLang(this.value)"></select></span>
    </div>
    <div class="body">
      <label data-i18n="key_lbl">chave do dispositivo</label>
      <input id="key" type="password" data-i18n-ph="key_ph" placeholder="cole a chave aqui" autocomplete="off">
      <button data-i18n="connect" onclick="conectar()">CONECTAR</button>
      <p class="muted" id="loginmsg"></p>
    </div>
  </div>

  <!-- app -->
  <div id="app" class="hide">
    <div class="card">
      <div class="top">
        <span class="star">✳</span>
        <span class="logo"><span class="e">esp</span><span class="n">nokia</span>
          <small>· Claw'd</small></span>
        <span class="right"><span id="conn" class="dot off">offline</span></span>
      </div>
      <div class="tabs">
        <button data-t="status" class="sel" data-i18n="tab_status" onclick="aba('status')">STATUS</button>
        <button data-t="claude" onclick="aba('claude')">CLAW'D</button>
        <button data-t="config" data-i18n="tab_config" onclick="aba('config')">CONFIG</button>
      </div>

      <div class="body">
        <section id="t-status">
          <div class="grid" id="stats"></div>
        </section>

        <section id="t-claude" class="hide">
          <label data-i18n="lbl_mem">memória persistente</label>
          <pre class="mem" id="mem">—</pre>
          <button class="ghost" data-i18n="forget" onclick="limpar()">ESQUECER TUDO</button>
          <label style="margin-top:20px" data-i18n="lbl_talks">conversas registradas</label>
          <div id="talks"></div>
          <div class="pag hide" id="pag">
            <button onclick="pagina(-1)">‹</button>
            <span id="paginfo"></span>
            <button onclick="pagina(1)">›</button>
          </div>
        </section>

        <section id="t-config" class="hide">
          <label data-i18n="lbl_iface">idioma da interface</label>
          <select id="lang1" class="lang" style="width:100%" onchange="setLang(this.value)"></select>
          <label data-i18n="lbl_persona">persona do Claw'd</label>
          <textarea id="c_persona"></textarea>
          <div class="row">
            <div><label data-i18n="lbl_stt">motor de STT</label>
              <select id="c_stt"><option value="local">local (whisper)</option>
                <option value="groq">groq</option></select></div>
            <div><label data-i18n="lbl_max">limite de resposta</label>
              <input id="c_max" type="number" min="40" max="600"></div>
          </div>
          <label data-i18n="lbl_model">modelo Claude</label>
          <input id="c_model" type="text">
          <div class="row" style="margin-top:6px">
            <div><label data-i18n="lbl_web">busca na web</label>
              <select id="c_web"><option value="true" data-i18n="web_on">ligada</option>
                <option value="false" data-i18n="web_off">desligada</option></select></div>
            <div><label data-i18n="lbl_anth">chave Anthropic <span id="haskey" class="muted"></span></label>
              <input id="c_key" type="password" data-i18n-ph="ph_anth" placeholder="(vazio = manter)"></div>
          </div>
          <button data-i18n="save" onclick="salvar()">SALVAR CONFIG</button>
        </section>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

const LANGS = ["pt","en","es","de","fr","fi","zh","ja","ko"];
let lang = localStorage.getItem("espnokia_lang")
        || (LANGS.includes(navigator.language.slice(0,2)) ? navigator.language.slice(0,2) : "pt");
function t(k){ return (I18N[lang]||I18N.pt)[k] ?? I18N.pt[k] ?? k; }

function montaSelects(){
  for(const id of ["lang0","lang1"]){
    const s = document.getElementById(id); if(!s) continue;
    s.innerHTML = LANGS.map(l=>`<option value="${l}">${I18N[l].lang}</option>`).join("");
    s.value = lang;
  }
}
function aplicaI18n(){
  document.documentElement.lang = lang;
  for(const el of document.querySelectorAll("[data-i18n]"))
    el.textContent = t(el.dataset.i18n);
  for(const el of document.querySelectorAll("[data-i18n-ph]"))
    el.placeholder = t(el.dataset.i18nPh);
  for(const id of ["lang0","lang1"]){ const s=document.getElementById(id); if(s) s.value=lang; }
  conn(document.getElementById("conn").classList.contains("on"));
  // re-renderiza a aba aberta pra atualizar os textos dinâmicos
  const app = document.getElementById("app");
  if(app && !app.classList.contains("hide")){
    const sel = document.querySelector(".tabs button.sel");
    if(sel) aba(sel.dataset.t);
  }
}
function setLang(v){ lang=v; localStorage.setItem("espnokia_lang",v); aplicaI18n(); }

let KEY = localStorage.getItem("espnokia_key") || "";
let pag = 0, pags = 1;
function api(path, opts={}){
  opts.headers = Object.assign({"X-Device-Key": KEY}, opts.headers||{});
  return fetch(path, opts);
}
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 1800);
}
function conn(ok){
  const c = document.getElementById("conn");
  c.className = "dot " + (ok?"on":"off"); c.textContent = ok ? t("on") : t("off");
}
async function conectar(){
  KEY = document.getElementById("key").value.trim();
  const r = await api("/admin/status");
  if(r.status !== 200){
    document.getElementById("loginmsg").textContent =
      r.status === 401 ? t("err_key") : t("err_srv");
    conn(false); return;
  }
  localStorage.setItem("espnokia_key", KEY);
  document.getElementById("login").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  conn(true); aba("status");
}
function aba(nome){
  for(const b of document.querySelectorAll(".tabs button"))
    b.classList.toggle("sel", b.dataset.t === nome);
  for(const s of ["status","claude","config"])
    document.getElementById("t-"+s).classList.toggle("hide", s !== nome);
  if(nome==="status") carregaStatus();
  if(nome==="claude"){ pag=0; carregaMemoria(); carregaTalks(); }
  if(nome==="config") carregaConfig();
}
async function carregaStatus(){
  const r = await api("/admin/status"); if(r.status!==200) return conn(false);
  const s = await r.json(); conn(true);
  const ts = s.memoria_ts ? new Date(s.memoria_ts*1000).toLocaleString() : "—";
  document.getElementById("stats").innerHTML = [
    [t("s_version"),"v"+s.versao], [t("s_convs"),s.conversas],
    [t("s_summaries"),s.resumidos], [t("s_stt"),s.stt],
    [t("s_model"),s.model.replace("claude-","")], [t("s_web"),s.web_search?t("web_yes"):t("web_no")],
    [t("s_anthropic"),s.tem_api_key?t("ok"):t("miss")], [t("s_mem_upd"),ts],
  ].map(([k,v])=>`<div class="stat"><b>${v}</b><span>${k}</span></div>`).join("");
}
async function carregaMemoria(){
  const r = await api("/claude/memoria"); const m = await r.json();
  document.getElementById("mem").textContent = m.memoria || t("mem_empty");
}
async function carregaTalks(){
  const r = await api("/claude/registro?pag="+pag); const d = await r.json();
  pags = d.pags || 1;
  document.getElementById("talks").innerHTML = d.itens.length ? d.itens.map(p=>
    `<div class="talk"><div class="meta">${p.d} ${p.h}</div>`+
    `<div class="q">${t("me")}: ${esc(p.q)}</div><div class="r">claw'd: ${esc(p.r)}</div></div>`
  ).join("") : `<p class="muted">${t("no_talks")}</p>`;
  document.getElementById("pag").classList.toggle("hide", pags<=1);
  document.getElementById("paginfo").textContent = (pag+1)+" / "+pags;
}
function pagina(d){ pag = Math.max(0, Math.min(pags-1, pag+d)); carregaTalks(); }
async function carregaConfig(){
  const r = await api("/admin/config"); const c = await r.json();
  document.getElementById("c_persona").value = c.persona;
  document.getElementById("c_stt").value = c.stt;
  document.getElementById("c_max").value = c.max_resposta_chars;
  document.getElementById("c_model").value = c.claude_model;
  document.getElementById("c_web").value = String(c.web_search);
  document.getElementById("haskey").textContent = c.tem_anthropic_key?t("has_yes"):t("has_no");
}
async function salvar(){
  const body = {
    persona: document.getElementById("c_persona").value,
    stt: document.getElementById("c_stt").value,
    max_resposta_chars: parseInt(document.getElementById("c_max").value)||220,
    claude_model: document.getElementById("c_model").value.trim(),
    web_search: document.getElementById("c_web").value === "true",
  };
  const k = document.getElementById("c_key").value.trim();
  if(k) body.anthropic_api_key = k;
  const r = await api("/admin/config", {method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  if(r.status===200){ toast(t("saved")); document.getElementById("c_key").value=""; }
  else toast(t("save_fail"));
}
async function limpar(){
  if(!confirm(t("confirm_forget"))) return;
  const r = await api("/claude/memoria/limpar", {method:"POST"});
  if(r.status===200){ toast(t("mem_cleared")); carregaMemoria(); carregaTalks(); }
  else toast(t("fail"));
}
function esc(s){ return s.replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// pareamento por QR: o aparelho gera .../#k=<chave>; a camera do celular abre o
// link e a gente loga, guardando a chave so neste navegador (sai da URL depois)
const _auto = new URLSearchParams(location.hash.slice(1)).get("k")
           || new URLSearchParams(location.search).get("k");
if(_auto){ KEY = _auto; history.replaceState(null, "", location.pathname); }

montaSelects(); aplicaI18n();
if(KEY){ document.getElementById("key").value = KEY; conectar(); }
</script>
</body>
</html>
