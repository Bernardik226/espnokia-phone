<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>espnokia · Claw'd</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#b9b9b9">
<link rel="icon" href="/static/icon-192.png">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="EspNokia Dash">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="/static/app.css">

<div class="wrap">
  <!-- login -->
  <div id="login" class="card">
    <div class="top">
      <span class="star">✳</span>
      <span class="logo"></span>
      <span class="right">
        <button class="iconbtn" onclick="toggleTheme()" aria-label="tema" title="tema">◐</button>
        <select id="lang0" class="lang" onchange="setLang(this.value)"></select>
      </span>
    </div>
    <div class="body">
      <p class="muted" data-i18n="login_qr">aponte a câmera pro QR do aparelho (Config &gt; Conexões) — ele já loga aqui. Ou cole a chave abaixo.</p>
      <label data-i18n="key_lbl">chave do dispositivo</label>
      <input id="key" type="password" data-i18n-ph="key_ph" placeholder="cole a chave aqui" autocomplete="off">
      <button data-i18n="connect" onclick="conectar()">CONECTAR</button>
      <p class="muted" id="loginmsg"></p>
    </div>
  </div>

  <!-- app -->
  <div id="app" class="card hide">
    <div class="top">
      <button class="iconbtn" onclick="toggleDrawer()" aria-label="menu" title="menu">☰</button>
      <span class="star">✳</span>
      <span class="logo"></span>
      <span class="right">
        <span id="conn" class="dot off">offline</span>
      </span>
    </div>
    <div class="body">
      <div id="home" class="grid3"></div>
      <div id="panel" class="panel hide"></div>
    </div>
  </div>
</div>

<div id="drawerwrap"></div>
<div id="toast" class="toast"></div>
<script src="/static/app.js"></script>
