[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino
; sem OTA nem SPIFFS no projeto: app unico de 3MB no lugar das
; duas particoes de 1.25MB do default (NVS fica no mesmo offset)
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  olikraus/U8g2@^2.36.5
  bblanchon/ArduinoJson@^7
  ricmoo/QRCode@^0.0.1

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
lib_deps = bblanchon/ArduinoJson@^7
